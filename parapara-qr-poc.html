<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>パラパラQR PoC Phase 1</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f4f5;
      color: #111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      box-sizing: border-box;
    }
    .app {
      width: min(440px, 100%);
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,.1);
      padding: 24px 18px;
      box-sizing: border-box;
    }
    h1 {
      margin: 8px 0 24px;
      text-align: center;
      font-size: 1.5rem;
    }
    .stack { display: grid; gap: 12px; }
    button {
      border: 0;
      border-radius: 12px;
      padding: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
    }
    .main-btn { background: #0f766e; color: #fff; }
    .sub-btn { background: #334155; color: #fff; font-size: .95rem; }
    .secondary { background: #e2e8f0; color: #111; }
    .danger { background: #dc2626; color: #fff; }
    .status {
      min-height: 1.5em;
      font-size: .95rem;
      margin-top: 12px;
      text-align: center;
    }
    .error { color: #b91c1c; font-weight: 700; }
    .hidden { display: none !important; }
    #qrContainer {
      background: #fff;
      padding: 12px;
      border-radius: 8px;
      margin: 6px auto;
      width: fit-content;
    }
    #meta {
      margin: 12px 0;
      font-size: .85rem;
      color: #334155;
      line-height: 1.45;
      text-align: center;
    }
    #playbackFrame {
      width: 100%;
      height: 90px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      margin-top: 8px;
    }
    .timer {
      text-align: center;
      font-variant-numeric: tabular-nums;
      font-weight: 700;
    }
    @media print {
      body { background: #fff; padding: 0; }
      .app > * { display: none !important; }
      #resultScreen, #resultScreen * { display: none !important; }
      #resultScreen.printing, #resultScreen.printing #qrContainer, #resultScreen.printing canvas {
        display: block !important;
      }
      #qrContainer { margin: 0 auto !important; box-shadow: none; padding: 0; }
    }
  </style>
</head>
<body>
  <main class="app" id="app">
    <section id="homeScreen">
      <h1>パラパラQR PoC</h1>
      <div class="stack">
        <button class="main-btn" id="fileBtn">📁 ファイル→QR生成</button>
        <button class="sub-btn" id="recordBtn">🎙 録音→QR</button>
      </div>
      <p class="status" id="homeStatus" aria-live="polite"></p>
    </section>

    <section id="recordScreen" class="hidden">
      <h1>録音中...</h1>
      <p class="timer" id="recordTimer">1.0 秒</p>
      <button class="secondary" id="cancelRecordBtn">← やり直し</button>
      <p class="status" id="recordStatus" aria-live="polite"></p>
    </section>

    <section id="resultScreen" class="hidden">
      <h1>QR 生成完了</h1>
      <div id="qrContainer" aria-label="QRコード"></div>
      <div id="meta"></div>
      <div class="stack">
        <button class="main-btn" id="testPlayBtn">▶ テスト再生</button>
        <button class="secondary" id="printBtn">🖨 印刷</button>
        <button class="secondary" id="retryBtn">← やり直し</button>
      </div>
      <iframe id="playbackFrame" class="hidden" title="テスト再生"></iframe>
      <p class="status" id="resultStatus" aria-live="polite"></p>
    </section>

    <section id="errorScreen" class="hidden">
      <h1>エラー</h1>
      <p class="status error" id="errorMessage"></p>
      <button class="secondary" id="errorRetryBtn">← やり直し</button>
    </section>

    <input id="fileInput" type="file" accept="audio/*" class="hidden" />
  </main>

    let currentPayload = '';

    const show = (section) => {
      [homeScreen, recordScreen, resultScreen, errorScreen].forEach((el) => el.classList.add('hidden'));
      section.classList.remove('hidden');
    };

    function bytesToBase64(uint8) {
      let binary = '';
      const chunk = 0x8000;
      for (let i = 0; i < uint8.length; i += chunk) {
        binary += String.fromCharCode(...uint8.subarray(i, i + chunk));
      }
      return btoa(binary);
    }

    function utf8ToBase64(str) {
      const bytes = new TextEncoder().encode(str);
      return bytesToBase64(bytes);
    }

    function inferMime(file, isRecording) {
      if (isRecording) return 'audio/webm';
      return file?.type && file.type.trim() ? file.type : MIME_FALLBACK;
    }

    function buildPayload(audioBytes, mimeType) {
      const audioB64 = bytesToBase64(audioBytes);
      const html = `<audio controls autoplay src="data:${mimeType};base64,${audioB64}"></audio>`;
      const outerB64 = utf8ToBase64(html);
      const payload = `data:text/html;base64,${outerB64}`;
      return { payload, audioB64, html };
    }

    function drawQr(payload) {
      qrContainer.innerHTML = '';
      const qr = qrcode(0, 'L', payload);
      qr.make();
      const moduleCount = qr.getModuleCount();
      const cell = 4;
      const margin = 8;
      const size = (moduleCount + margin * 2) * cell;
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, size, size);
      ctx.fillStyle = '#000';
      for (let r = 0; r < moduleCount; r++) {
        for (let c = 0; c < moduleCount; c++) {
          if (qr.isDark(r, c)) {
            ctx.fillRect((c + margin) * cell, (r + margin) * cell, cell, cell);
          }
        }
      }
      qrContainer.appendChild(canvas);
      return qr;
    }

    function showError(msg) {
      errorMessage.textContent = msg;
      show(errorScreen);
    }

    async function processAudioBytes(audioBytes, mimeType) {
      const { payload } = buildPayload(audioBytes, mimeType);
      if (payload.length > MAX_PAYLOAD_BYTES) {
        showError(`ファイルが大きすぎます（${audioBytes.length} bytes / 上限 約1,600 bytes）`);
        return;
      }
      const qr = drawQr(payload);
      currentPayload = payload;
      playbackFrame.classList.add('hidden');
      playbackFrame.removeAttribute('src');
      meta.innerHTML = [
        `データ: ${audioBytes.length.toLocaleString()} B`,
        `QR Version: ${qr.typeNumber} (L)`,
        `ペイロード: ${payload.length.toLocaleString()} B`
      ].join('<br>');
      resultStatus.textContent = '';
      show(resultScreen);
    }

    async function handleFile(file) {
      if (!file) return;
      homeStatus.textContent = '処理中...';
      try {
        const arr = new Uint8Array(await file.arrayBuffer());
        await processAudioBytes(arr, inferMime(file, false));
      } catch (err) {
        showError('ファイルの読み込みに失敗しました');
      } finally {
        homeStatus.textContent = '';
      }
    }

    function createRecorder(stream) {
      const supports = typeof MediaRecorder.isTypeSupported === 'function';
      const configs = [
        { mimeType: 'audio/webm;codecs=opus', audioBitsPerSecond: 8000 },
        { mimeType: 'audio/webm', audioBitsPerSecond: 8000 },
        { audioBitsPerSecond: 8000 },
        {}
      ];

      let lastError;
      for (const cfg of configs) {
        try {
          if (cfg.mimeType && supports && !MediaRecorder.isTypeSupported(cfg.mimeType)) {
            continue;
          }
          return new MediaRecorder(stream, cfg);
        } catch (err) {
          lastError = err;
        }
      }
      throw lastError || new Error('MediaRecorder unavailable');
    }

    async function startRecording() {
      if (!window.isSecureContext) {
        showError('録音は https または localhost で開いてください');
        return;
      }
      if (!navigator.mediaDevices?.getUserMedia || typeof MediaRecorder === 'undefined') {
        showError('この端末は非対応です');
        return;
      }

      show(recordScreen);
      recordStatus.textContent = '';
      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: { channelCount: 1 } });
      } catch (err) {
        showError('マイクの利用が許可されませんでした');
        return;
      }

      try {
        const chunks = [];
        const rec = createRecorder(stream);
        rec.ondataavailable = (e) => { if (e.data?.size) chunks.push(e.data); };

        let remain = 10;
        recordTimer.textContent = '1.0 秒';
        const t = setInterval(() => {
          remain -= 1;
          recordTimer.textContent = `${Math.max(0, remain / 10).toFixed(1)} 秒`;
        }, 100);

        const stopPromise = new Promise((resolve, reject) => {
          rec.onerror = () => reject(new Error('recording error'));
          rec.onstop = resolve;
        });

        rec.start(250);
        setTimeout(() => {
          try {
            if (rec.state === 'recording' && typeof rec.requestData === 'function') {
              rec.requestData();
            }
          } catch (err) {
            // ignore
          }
          setTimeout(() => rec.state !== 'inactive' && rec.stop(), 150);
        }, 1000);
        await stopPromise;
        clearInterval(t);

        if (!chunks.length) {
          throw new Error('no audio chunks');
        }

        const outType = rec.mimeType && rec.mimeType.trim() ? rec.mimeType : 'audio/webm';
        const blob = new Blob(chunks, { type: outType });
        const arr = new Uint8Array(await blob.arrayBuffer());
        await processAudioBytes(arr, outType);
      } catch (err) {
        showError('録音に失敗しました（Edgeでは localhost で開く/マイク許可を再設定してください）');
      } finally {
        stream.getTracks().forEach((tr) => tr.stop());
      }
    }

    fileBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => handleFile(e.target.files?.[0]));
    recordBtn.addEventListener('click', startRecording);
    cancelRecordBtn.addEventListener('click', () => show(homeScreen));
    retryBtn.addEventListener('click', () => show(homeScreen));
    errorRetryBtn.addEventListener('click', () => show(homeScreen));

    testPlayBtn.addEventListener('click', () => {
      if (!currentPayload) return;
      playbackFrame.src = currentPayload;
      playbackFrame.classList.remove('hidden');
      resultStatus.textContent = 'テスト再生を表示しました';
    });

    printBtn.addEventListener('click', () => {
      resultScreen.classList.add('printing');
      window.print();
      setTimeout(() => resultScreen.classList.remove('printing'), 100);
    });
  </script>
</body>
</html>
